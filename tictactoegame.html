<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet", href="tictactoegame.css">
</head>
<body>
    <main>

    <div class="message-container">
        <div class="winner-box">
        <button class="newbtn">🔄 New Game</button>
        <p class="msg">Winner</p>
        </div>
    </div>

    <div class="container">
     <div class="game-box">
        <h1>❌⭕ LET'S PLAY TIC TAC TOE GAME</h1>

        <div class="game">
            <button class="box"></button>
            <button class="box"></button>
            <button class="box"></button>

            <button class="box"></button>
            <button class="box"></button>
            <button class="box"></button>

            <button class="box"></button>
            <button class="box"></button>
            <button class="box"></button>
        </div>
        <button class="resetbtn">♻️ Reset Game</button>
     </div>
    </div>

</main>
    
    <script src="tictactoegame.js"></script>
</body>
</html>
